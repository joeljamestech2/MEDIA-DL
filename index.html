<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h2 { margin-bottom: 20px; }

.search-container {
  display: flex;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
  padding-left: 10px;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.results { margin-top: 20px; }
.card { 
  background: #111; 
  padding: 10px; 
  margin-bottom: 10px; 
  border-radius: 10px; 
  text-align: left;
}
.card img { 
  width: 100%; 
  border-radius: 6px; 
}
.card-title { font-weight: bold; margin: 5px 0; }
.card-author { color: #aaa; margin-bottom: 5px; }

button {
  margin: 5px 5px 0 0;
  padding: 5px 10px;
  background: #00d9ff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>

<body>
<h2>JOEL XMD YT DOWNLOADER</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
// 🔍 SEARCH USING ALYACORE API
async function searchVideos() {
  const query = document.getElementById("query").value.trim();
  const resultsDiv = document.getElementById("results");
  if (!query) return;

  resultsDiv.innerHTML = `<p><i class="fa fa-spinner fa-spin"></i> Searching...</p>`;

  try {
    const apiUrl = `https://api.alyacore.xyz/search/yt?query=${encodeURIComponent(query)}&key=stellar-GIuQCl96`;
    const res = await fetch(apiUrl);
    const data = await res.json();

    if (!data.status || !data.result) {
      resultsDiv.innerHTML = `<p>❌ Search failed</p>`;
      return;
    }

    resultsDiv.innerHTML = "";

    data.result.slice(0, 10).forEach(video => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${video.banner}" alt="${video.title}">
        <p class="card-title">${video.title}</p>
        <p class="card-author">${video.autor} • ${video.duration} • ${video.views} views • ${video.uploaded}</p>
        <button onclick="download('${video.url}','mp3')"><i class="fa fa-music"></i> MP3</button>
        <button onclick="download('${video.url}','mp4')"><i class="fa fa-video"></i> MP4</button>
      `;
      resultsDiv.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    resultsDiv.innerHTML = `<p>❌ Search failed</p>`;
  }
}

// 📥 DOWNLOAD USING TKM API
async function download(url, format) {
  try {
    const apiUrl = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const res = await fetch(apiUrl);
    const data = await res.json();

    if (data?.data?.url) {
      // OPEN DOWNLOAD LINK IN NEW TAB
      window.open(data.data.url, "_blank");
    } else {
      alert("❌ Download link not found");
    }
  } catch (err) {
    console.error(err);
    alert("❌ Download failed");
  }
}

// AUTO LOAD TRENDING
window.onload = () => {
  document.getElementById("query").value = "trending music";
  searchVideos();
};
</script>
</body>
</html>
