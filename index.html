<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --neon-blue: #00d9ff;
  --bg-dark: #0a0a0a;
  --card-bg: #111;
  --text-light: #eee;
  --btn-bg: #00d9ff;
  --btn-color: #000;
  --bar-bg: #222;
  --bar-fill: #00d9ff;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-dark);
  color: var(--text-light);
  padding: 20px;
}

h1 {
  text-align: center;
  color: var(--neon-blue);
  margin-bottom: 20px;
}

.search-container {
  display: flex;
  max-width: 600px;
  margin: 0 auto 30px auto;
  background: var(--card-bg);
  border-radius: 50px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,217,255,0.3);
}

.search-input {
  flex: 1;
  border: none;
  padding: 12px 20px;
  background: transparent;
  color: var(--text-light);
  font-size: 1rem;
  outline: none;
}

.icon-button {
  width: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card-bg);
  cursor: pointer;
  transition: 0.2s;
}

.icon-button:hover {
  background: rgba(0,217,255,0.2);
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card-bg);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,217,255,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(0,217,255,0.5);
}

.card img {
  width: 100%;
  display: block;
}

.meta {
  padding: 10px;
}

.meta p {
  margin: 5px 0;
  font-size: 0.9rem;
  color: #ccc;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  flex: 1;
  margin: 0 5px;
  padding: 8px 0;
  border: none;
  border-radius: 8px;
  background: var(--btn-bg);
  color: var(--btn-color);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: rgba(0,217,255,0.8);
}

.error, .loading {
  text-align: center;
  margin: 20px;
  color: var(--neon-blue);
  font-size: 0.9rem;
}

.download-bar {
  height: 6px;
  background: var(--bar-bg);
  border-radius: 5px;
  overflow: hidden;
  margin-top: 5px;
  display: flex;
  align-items: center;
  font-size: 0.75rem;
}

.download-fill {
  height: 100%;
  width: 0%;
  background: var(--bar-fill);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 5px;
  color: #000;
  font-weight: bold;
  border-radius: 5px;
}

.download-container {
  margin-top: 5px;
}
</style>
</head>
<body>

<h1>JOEL XMD YT DOWNLOADER</h1>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube or paste URL">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>
<div id="error" class="error"></div>

<script>
// Safe fetch with timeout
async function fetchWithTimeout(url, timeout = 10000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try {
    const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: controller.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error("Fetch failed");
    return await res.json();
  } catch(e) {
    clearTimeout(id);
    throw e;
  }
}

async function searchVideos(retry = true) {
  const query = document.getElementById("query").value.trim();
  const results = document.getElementById("results");
  const error = document.getElementById("error");
  results.innerHTML = '';
  error.textContent = '';

  if(!query) return;

  results.innerHTML = `<div class="loading"><i class="fa fa-spinner fa-spin"></i> Searching...</div>`;

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(query)}`;
    const data = await fetchWithTimeout(api, 10000); // 10 sec timeout

    if(!data.results?.length){
      results.innerHTML = '';
      error.textContent = "❌ No results found";
      return;
    }

    results.innerHTML = '';

    data.results.slice(0,10).forEach(video => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${video.thumbnail}" alt="${video.title}">
        <div class="meta">
          <p><b>${video.title}</b></p>
          <p><i class="fa fa-user"></i> ${video.author}</p>
          <p><i class="fa fa-clock"></i> ${video.duration}</p>
        </div>
        <div class="actions">
          <button onclick="downloadMedia(this,'${video.url}','mp3')"><i class="fa fa-music"></i> MP3</button>
          <button onclick="downloadMedia(this,'${video.url}','mp4')"><i class="fa fa-video"></i> MP4</button>
        </div>
        <div class="download-container">
          <div class="download-bar">
            <div class="download-fill"><i class="fa fa-wifi"></i> 0%</div>
          </div>
        </div>
      `;
      results.appendChild(card);
    });

  } catch(e){
    if(retry){
      console.log("Retrying search due to timeout...");
      setTimeout(()=>searchVideos(false), 1500); // wait 1.5s then retry
    } else {
      results.innerHTML = '';
      error.textContent = "❌ Search failed, please try again";
      console.error(e);
    }
  }
}

async function downloadMedia(button,url,format){
  const fill = button.closest('.card').querySelector('.download-fill');
  fill.style.width = '0%';
  fill.textContent = '0%';

  try{
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const res = await fetch(api);
    const data = await res.json();

    if(data?.data?.url){
      const dlUrl = data.data.url;
      let progress = 0;

      const interval = setInterval(()=>{
        progress += Math.floor(Math.random()*10)+5;
        if(progress>=100) progress=100;
        fill.style.width = progress + '%';
        fill.innerHTML = `<i class="fa fa-wifi"></i> ${progress}%`;
        if(progress>=100){
          clearInterval(interval);
          const a = document.createElement('a');
          a.href = dlUrl;
          a.download = '';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
      }, 400); // slower to simulate fetch
    } else {
      fill.innerHTML = '❌ Failed';
    }

  } catch(e){
    fill.innerHTML = '❌ Error';
    console.error(e);
  }
}

// Auto search trending
window.onload = ()=>{
  document.getElementById("query").value = "trending music";
  searchVideos();
};

// Enter key triggers search
document.getElementById("query").addEventListener("keydown", e=>{
  if(e.key==="Enter") searchVideos();
});
</script>
</body>
</html>
