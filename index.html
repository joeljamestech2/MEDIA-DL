<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

.search-container {
  display: flex;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.results { margin-top: 20px; }
.card { background: #111; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
.card img { width: 100%; border-radius: 6px; }

button {
  margin-top: 5px;
  padding: 5px 10px;
  background: #00d9ff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>JOEL XMD DOWNLOADER</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <span class="material-icons">search</span>
  </div>
</div>

<div id="results"></div>

<script>
// 🔥 fallback system
const proxies = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchSafe(url) {
  for (let p of proxies) {
    try {
      const res = await fetch(p(url));
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("Fetch failed");
}

// 🔍 SEARCH
async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");

  if (!q) return;

  results.innerHTML = "🔍 Searching...";

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(q)}`;
    const data = await fetchSafe(api);

    results.innerHTML = "";

    data.results.slice(0, 10).forEach(v => {
      results.innerHTML += `
        <div class="card">
          <img src="${v.thumbnail}">
          <p><b>${v.title}</b></p>
          <p>${v.author}</p>
          <button onclick="download('${v.url}','mp3')">MP3</button>
          <button onclick="download('${v.url}','mp4')">MP4</button>
        </div>
      `;
    });

  } catch {
    results.innerHTML = "❌ Search failed";
  }
}

// 📥 DOWNLOAD (REAL FIX)
async function download(url, format) {
  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;

    const data = await fetchSafe(api);

    console.log(data); // debug

    if (data?.data?.url) {
      // ✅ OPEN REAL FILE LINK
      window.open(data.data.url, "_blank");
    } else {
      alert("❌ No download link");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Download failed");
  }
}

// AUTO LOAD
window.onload = () => {
  document.getElementById("query").value = "trending music";
  searchVideos();
};
</script>

</body>
</html>
