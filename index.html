<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

.search-box {
  display: flex;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-box input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
}

.icon-btn {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.card {
  background: #111;
  margin-top: 15px;
  padding: 10px;
  border-radius: 12px;
  text-align: left;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

button {
  margin-top: 6px;
  padding: 6px 12px;
  border: none;
  background: #00d9ff;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}

.bar {
  height: 6px;
  background: #222;
  margin-top: 5px;
  border-radius: 3px;
  overflow: hidden;
}

.progress {
  height: 100%;
  width: 0%;
  background: #00d9ff;
  font-size: 10px;
  text-align: right;
  padding-right: 5px;
}
</style>
</head>
<body>

<h2>JOEL XMD DOWNLOADER</h2>

<div class="search-box">
  <input id="q" placeholder="Search...">
  <div class="icon-btn" onclick="search()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
const API_KEY = "stellar-GIuQCl96";

// 🔍 SEARCH
async function search() {
  const q = document.getElementById("q").value.trim();
  const resBox = document.getElementById("results");

  if (!q) return;

  resBox.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Searching...';

  try {
    const res = await fetch(`https://api.alyacore.xyz/search/yt?query=${encodeURIComponent(q)}&key=${API_KEY}`);
    const data = await res.json();

    resBox.innerHTML = "";

    data.result.slice(0, 10).forEach(v => {
      resBox.innerHTML += `
        <div class="card">
          <img src="${v.banner}">
          <p><b>${v.title}</b></p>
          <p>${v.autor} • ${v.duration}</p>

          <button onclick="download('${v.url}','mp3',this)">
            <i class="fa fa-music"></i> MP3
          </button>

          <button onclick="download('${v.url}','mp4',this)">
            <i class="fa fa-video"></i> MP4
          </button>

          <div class="bar">
            <div class="progress"><i class="fa fa-wifi"></i> 0%</div>
          </div>
        </div>
      `;
    });

  } catch {
    resBox.innerHTML = "❌ Search failed";
  }
}

// 📥 DOWNLOAD (FIXED)
async function download(url, format, btn) {
  const progress = btn.parentElement.querySelector(".progress");

  let percent = 0;

  // fake smooth loading
  const interval = setInterval(() => {
    if (percent < 90) {
      percent += 5;
      progress.style.width = percent + "%";
      progress.innerHTML = `<i class="fa fa-wifi"></i> ${percent}%`;
    }
  }, 200);

  try {
    const res = await fetch(`https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`);
    const data = await res.json();

    clearInterval(interval);

    if (data?.data?.url) {
      progress.style.width = "100%";
      progress.innerHTML = `<i class="fa fa-wifi"></i> 100%`;

      // open download
      window.open(data.data.url, "_blank");
    } else {
      progress.innerHTML = "❌ Failed";
    }

  } catch (err) {
    clearInterval(interval);
    progress.innerHTML = "❌ Error";
  }
}

// auto load
window.onload = () => {
  document.getElementById("q").value = "Yatapita";
  search();
};
</script>

</body>
</html>
