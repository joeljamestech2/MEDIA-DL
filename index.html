<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

.search-box {
  display: flex;
  background: #111;
  border-radius: 40px;
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

.search-box input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
  font-size: 16px;
}

.icon-btn {
  background: #222;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.card {
  background: #111;
  margin-top: 20px;
  padding: 12px;
  border-radius: 16px;
  text-align: left;
  box-shadow: 0 0 10px #00d9ff33;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card p {
  margin: 5px 0;
  font-size: 14px;
}

button {
  margin-top: 8px;
  margin-right: 5px;
  padding: 8px 14px;
  border: none;
  background: #00d9ff;
  border-radius: 30px;
  cursor: pointer;
  font-family: inherit;
}

.bar {
  height: 6px;
  background: #222;
  margin-top: 8px;
  border-radius: 4px;
  overflow: hidden;
}

.progress {
  height: 100%;
  width: 0%;
  background: #00d9ff;
  font-size: 10px;
  text-align: right;
  padding-right: 5px;
}
</style>
</head>
<body>

<h2>JOEL XMD DOWNLOADER</h2>

<div class="search-box">
  <input id="q" placeholder="Search YouTube...">
  <div class="icon-btn" onclick="search()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
const KEY = "stellar-GIuQCl96";

// 🔍 SEARCH FUNCTION
async function search() {
  const q = document.getElementById("q").value.trim();
  const box = document.getElementById("results");

  if (!q) return;

  box.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Searching...';

  try {
    const res = await fetch(`https://api.alyacore.xyz/search/yt?query=${encodeURIComponent(q)}&key=${KEY}`);
    const data = await res.json();

    box.innerHTML = "";

    data.result.slice(0, 10).forEach(v => {
      box.innerHTML += `
        <div class="card">
          <img src="${v.banner}">
          <p><b>${v.title}</b></p>
          <p>${v.autor} • ${v.duration} • ${v.views}</p>

          <button onclick="download('${v.url}','mp3',this)">
            <i class="fa fa-music"></i> MP3
          </button>

          <button onclick="download('${v.url}','mp4',this)">
            <i class="fa fa-video"></i> MP4
          </button>

          <div class="bar">
            <div class="progress"><i class="fa fa-wifi"></i> 0%</div>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    box.innerHTML = "❌ Search failed";
  }
}

// 📥 DOWNLOAD FUNCTION (FINAL FIX)
async function download(url, type, btn) {
  const progress = btn.parentElement.querySelector(".progress");

  let p = 0;

  // smooth loading animation
  const loader = setInterval(() => {
    if (p < 95) {
      p += 5;
      progress.style.width = p + "%";
      progress.innerHTML = `<i class="fa fa-wifi"></i> ${p}%`;
    }
  }, 200);

  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${type}?apikey=tkm&url=${encodeURIComponent(url)}`;

    const res = await fetch(api);
    const json = await res.json();

    clearInterval(loader);

    if (json.status && json.data && json.data.url) {
      const dl = json.data.url;

      progress.style.width = "100%";
      progress.innerHTML = `<i class="fa fa-wifi"></i> 100%`;

      // ✅ REQUIRED METHOD
      window.open(dl, "_blank");

    } else {
      progress.innerHTML = "❌ Failed";
    }

  } catch (e) {
    clearInterval(loader);
    progress.innerHTML = "❌ Error";
  }
}

// auto load demo
window.onload = () => {
  document.getElementById("q").value = "Yatapita";
  search();
};
</script>

</body>
</html>
