<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link rel="icon" href="https://raw.githubusercontent.com/joeljamestech2/JOEL-XMD/refs/heads/main/mydata/media/joelXtec.jpg">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h1 {
  color: #00d9ff;
  font-size: 1.3rem;
}

.search-container {
  display: flex;
  align-items: center;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
  padding: 10px;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 6px;
  cursor: pointer;
}

.icon-button:hover {
  background: #333;
}

.results {
  margin-top: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 15px;
  text-align: left;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.meta p {
  margin: 4px 0;
  font-size: 0.85rem;
  color: #ccc;
}

.actions {
  margin-top: 8px;
}

.actions button {
  margin-right: 5px;
  padding: 6px 10px;
  border: none;
  background: #00d9ff;
  color: #000;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: bold;
}

.actions button:disabled {
  opacity: 0.6;
}

.loading {
  color: #00d9ff;
}

.error {
  color: red;
}
</style>
</head>

<body>

<h1>JOEL XMD YT DOWNLOADER</h1>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search or paste YouTube URL">

  <div class="icon-button" onclick="searchVideos()">
    <span class="material-icons">search</span>
  </div>
</div>

<div id="error" class="error"></div>
<div id="results" class="results"></div>

<script>
// 🔥 GLOBAL FALLBACK SYSTEM
const proxies = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

async function fetchWithFallback(url) {
  for (let proxy of proxies) {
    try {
      const res = await fetch(proxy(url));
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("All fetch attempts failed");
}

const input = document.getElementById("query");
const results = document.getElementById("results");
const error = document.getElementById("error");

// AUTO LOAD
window.onload = () => {
  input.value = "trending music";
  searchVideos();
};

// ENTER KEY
input.addEventListener("keydown", e => {
  if (e.key === "Enter") searchVideos();
});

// 🔍 SEARCH
async function searchVideos() {
  const query = input.value.trim();
  if (!query) return;

  results.innerHTML = '<div class="loading">🔍 Searching...</div>';
  error.textContent = "";

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(query)}`;
    const data = await fetchWithFallback(api);

    results.innerHTML = "";

    if (!data.results?.length) {
      error.textContent = "❌ No results found";
      return;
    }

    data.results.slice(0, 20).forEach(video => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${video.thumbnail}">
        <div class="meta">
          <p><strong>${video.title}</strong></p>
          <p>👤 ${video.author}</p>
          <p>⏱ ${video.duration}</p>
        </div>

        <div class="actions">
          <button onclick="downloadMedia('${video.url}','mp3',this)">MP3</button>
          <button onclick="downloadMedia('${video.url}','mp4',this)">MP4</button>
        </div>
      `;

      results.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    error.textContent = "❌ Failed to fetch videos (CORS/API issue)";
  }
}

// 📥 DOWNLOAD
async function downloadMedia(url, format, btn) {
  btn.disabled = true;
  const original = btn.innerText;
  btn.innerText = "Loading...";

  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?url=${encodeURIComponent(url)}`;
    const data = await fetchWithFallback(api);

    if (data?.data?.url) {
      window.open(data.data.url, "_blank");
    } else {
      alert("❌ Download failed");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Download error (CORS/API)");
  }

  btn.disabled = false;
  btn.innerText = original;
}
</script>

</body>
</html>
