<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

.search-container {
  display: flex;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.results { margin-top: 20px; }

.card {
  background: #111;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 10px;
  text-align: left;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

button {
  margin-top: 5px;
  padding: 6px 10px;
  background: #00d9ff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* 🔽 DOWNLOAD BAR */
.download-box {
  margin-top: 6px;
}

.bar {
  height: 6px;
  background: #222;
  border-radius: 5px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #00d9ff;
  font-size: 10px;
  text-align: right;
  padding-right: 5px;
  color: #000;
}
</style>
</head>

<body>

<h2>JOEL XMD DOWNLOADER</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
// 🔥 fallback system (KEEP THIS - it's why yours worked)
const proxies = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchSafe(url) {
  for (let p of proxies) {
    try {
      const res = await fetch(p(url));
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("Fetch failed");
}

// 🔍 SEARCH
async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");

  if (!q) return;

  results.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Searching...`;

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(q)}`;
    const data = await fetchSafe(api);

    results.innerHTML = "";

    data.results.slice(0, 10).forEach(v => {
      results.innerHTML += `
        <div class="card">
          <img src="${v.thumbnail}">
          <p><b>${v.title}</b></p>
          <p><i class="fa fa-user"></i> ${v.author}</p>

          <button onclick="download(this,'${v.url}','mp3')">
            <i class="fa fa-music"></i> MP3
          </button>

          <button onclick="download(this,'${v.url}','mp4')">
            <i class="fa fa-video"></i> MP4
          </button>

          <div class="download-box">
            <div class="bar">
              <div class="fill"><i class="fa fa-wifi"></i> 0%</div>
            </div>
          </div>
        </div>
      `;
    });

  } catch {
    results.innerHTML = "❌ Search failed";
  }
}

// 📥 DOWNLOAD WITH BAR
async function download(btn, url, format) {
  const fill = btn.closest('.card').querySelector('.fill');

  fill.style.width = "0%";
  fill.innerHTML = `<i class="fa fa-wifi"></i> 0%`;

  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const data = await fetchSafe(api);

    if (data?.data?.url) {
      const dl = data.data.url;

      let progress = 0;

      const loader = setInterval(() => {
        progress += 8;
        if (progress > 100) progress = 100;

        fill.style.width = progress + "%";
        fill.innerHTML = `<i class="fa fa-wifi"></i> ${progress}%`;

        if (progress === 100) {
          clearInterval(loader);

          const a = document.createElement("a");
          a.href = dl;
          a.download = "";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
      }, 300);

    } else {
      fill.innerHTML = "❌";
    }

  } catch (err) {
    fill.innerHTML = "❌";
  }
}

// AUTO LOAD
window.onload = () => {
  document.getElementById("query").value = "trending music";
  searchVideos();
};
</script>

</body>
</html>
