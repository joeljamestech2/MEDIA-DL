<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h2 { margin-bottom: 20px; }

.search-container {
  display: flex;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.results { margin-top: 20px; }
.card {
  background: #111;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 12px;
  text-align: left;
  position: relative;
}
.card img {
  width: 100%;
  border-radius: 6px;
}
.card p { margin: 5px 0; font-size: 0.9rem; }

button {
  margin: 5px 5px 0 0;
  padding: 6px 12px;
  background: #00d9ff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
}

.download-bar {
  height: 6px;
  background: #00d9ff33;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 5px;
}
.download-progress {
  height: 100%;
  width: 0%;
  background: #00d9ff;
  text-align: right;
  padding-right: 5px;
  font-size: 0.7rem;
  line-height: 6px;
}
</style>
</head>
<body>

<h2>JOEL XMD YT DOWNLOADER</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
const API_KEY = "stellar-GIuQCl96";

// 🌐 fallback system
const servers = [
  q => `https://api.alyacore.xyz/search/yt?query=${encodeURIComponent(q)}&key=${API_KEY}`
];

async function fetchSafe(urls) {
  for (let u of urls) {
    try {
      const res = await fetch(u);
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("Failed to fetch results");
}

async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");
  if (!q) return;
  results.innerHTML = '<p><i class="fa fa-spinner fa-spin"></i> Searching...</p>';

  try {
    const data = await fetchSafe(servers.map(fn => fn(q)));
    results.innerHTML = "";

    data.result.slice(0, 10).forEach(v => {
      results.innerHTML += `
        <div class="card">
          <img src="${v.banner}">
          <p><b>${v.title}</b></p>
          <p>${v.autor} • ${v.duration} • ${v.views} views • ${v.uploaded}</p>
          <button onclick="downloadVideo('${v.url}','mp3', this)">MP3 <i class="fa fa-music"></i></button>
          <button onclick="downloadVideo('${v.url}','mp4', this)">MP4 <i class="fa fa-video"></i></button>
          <div class="download-bar"><div class="download-progress"><i class="fa fa-wifi"></i> 0%</div></div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    results.innerHTML = '<p>❌ Search failed</p>';
  }
}

async function downloadVideo(url, format, btn) {
  const progressBar = btn.parentElement.querySelector(".download-progress");
  progressBar.style.width = "0%";
  progressBar.textContent = "0%";

  const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;

  try {
    const res = await fetch(api);
    const reader = res.body.getReader();
    const contentLength = +res.headers.get("Content-Length") || 1000000; // fallback
    let received = 0;

    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      received += value.length;
      const percent = Math.min(100, Math.floor(received / contentLength * 100));
      progressBar.style.width = percent + "%";
      progressBar.textContent = `${percent}%`;
    }

    const data = await res.json();
    if(data?.data?.url) {
      progressBar.style.width = "100%";
      progressBar.textContent = "100%";
      window.open(data.data.url, "_blank");
    } else {
      progressBar.textContent = "❌ Failed";
    }

  } catch (err) {
    console.error(err);
    progressBar.textContent = "❌ Error";
  }
}

// auto load example
window.onload = () => {
  document.getElementById("query").value = "Yatapita";
  searchVideos();
};
</script>

</body>
</html>
