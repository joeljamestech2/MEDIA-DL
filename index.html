<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  body {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    background: #000;
    color: #fff;
    padding: 1rem;
    text-align: center;
  }

  .search-container {
    display: flex;
    background: #111;
    border: 1px solid #333;
    border-radius: 30px;
    padding: 8px 15px;
    max-width: 600px;
    margin: 0 auto 20px auto;
  }

  .search-input {
    flex: 1;
    border: none;
    background: transparent;
    color: #fff;
    outline: none;
    font-size: 14px;
  }

  .icon-button {
    background: #222;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
  }

  .icon-button:hover {
    background: #00d9ff;
    color: #000;
  }

  .results { margin-top: 20px; }

  .card {
    background: #111;
    padding: 12px;
    margin: 0 auto 15px auto;
    border-radius: 12px;
    text-align: left;
    max-width: 600px;
    border: 1px solid #222;
  }

  .card img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .video-info { margin-bottom: 10px; }
  .video-info b { display: block; margin-bottom: 5px; color: #00d9ff; }
  .meta-row { font-size: 12px; color: #aaa; display: flex; gap: 15px; margin-bottom: 10px; }

  .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }

  button {
    flex: 1;
    padding: 8px;
    background: #222;
    color: #fff;
    border: 1px solid #333;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    transition: 0.2s;
  }

  button:hover {
    background: #00d9ff;
    color: #000;
    border-color: #00d9ff;
  }

  /* 🔽 DOWNLOAD BAR */
  .download-box {
    background: #0a0a0a;
    padding: 8px;
    border-radius: 8px;
  }

  .bar-label {
    font-size: 10px;
    color: #666;
    margin-bottom: 4px;
    display: block;
    text-transform: uppercase;
  }

  .bar {
    height: 12px;
    background: #1a1a1a;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00d9ff, #0088ff);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    transition: width 0.3s ease;
  }

  .fill span {
    font-size: 9px;
    font-weight: bold;
    color: #000;
    padding-right: 5px;
    white-space: nowrap;
  }

  .status-msg { font-size: 12px; margin-top: 10px; }
</style>
</head>

<body>

<h2><i class="fa fa-cloud-arrow-down"></i> JOEL XMD</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-magnifying-glass"></i>
  </div>
</div>

<div id="results"></div>

<script>
const proxies = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchSafe(url) {
  for (let p of proxies) {
    try {
      const res = await fetch(p(url));
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("Network Error");
}

async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");

  if (!q) return;

  results.innerHTML = `<div class="status-msg"><i class="fa fa-spinner fa-spin"></i> Locating content...</div>`;

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(q)}`;
    const data = await fetchSafe(api);

    results.innerHTML = "";

    data.results.slice(0, 10).forEach(v => {
      // Clean up the timestamp if it exists, otherwise use 'Live/Unknown'
      const time = v.timestamp || 'N/A';
      
      results.innerHTML += `
        <div class="card">
          <img src="${v.thumbnail}">
          <div class="video-info">
            <b>${v.title}</b>
            <div class="meta-row">
              <span><i class="fa fa-user"></i> ${v.author}</span>
              <span><i class="fa fa-clock"></i> ${time}</span>
            </div>
          </div>

          <div class="btn-group">
            <button onclick="download(this,'${v.url}','mp3')">
              <i class="fa fa-music"></i> MP3
            </button>
            <button onclick="download(this,'${v.url}','mp4')">
              <i class="fa fa-video"></i> MP4
            </button>
          </div>

          <div class="download-box">
            <span class="bar-label"><i class="fa fa-terminal"></i> Status</span>
            <div class="bar">
              <div class="fill"><span><i class="fa fa-wifi"></i> 0%</span></div>
            </div>
          </div>
        </div>
      `;
    });

  } catch {
    results.innerHTML = `<div class="status-msg"><i class="fa fa-triangle-exclamation"></i> Search Failed</div>`;
  }
}

async function download(btn, url, format) {
  const card = btn.closest('.card');
  const fill = card.querySelector('.fill');
  const label = card.querySelector('.bar-label');

  // Reset UI
  fill.style.width = "0%";
  fill.querySelector('span').innerHTML = `<i class="fa fa-wifi"></i> 0%`;
  label.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Fetching Stream...`;

  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const data = await fetchSafe(api);

    if (data?.data?.url) {
      const dlLink = data.data.url;
      let progress = 0;

      const loader = setInterval(() => {
        progress += Math.floor(Math.random() * 15) + 5; // Simulating data chunks
        if (progress > 100) progress = 100;

        fill.style.width = progress + "%";
        fill.querySelector('span').innerHTML = `<i class="fa fa-wifi"></i> ${progress}%`;
        label.innerHTML = `<i class="fa fa-download"></i> Processing Data...`;

        if (progress === 100) {
          clearInterval(loader);
          label.innerHTML = `<i class="fa fa-check-circle"></i> Complete`;
          
          const a = document.createElement("a");
          a.href = dlLink;
          a.download = "";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
      }, 200);

    } else {
      label.innerHTML = `<i class="fa fa-circle-xmark"></i> Stream Unavailable`;
      fill.style.background = "#ff4444";
    }

  } catch (err) {
    label.innerHTML = `<i class="fa fa-triangle-exclamation"></i> Download Error`;
    fill.style.background = "#ff4444";
  }
}

window.onload = () => {
  document.getElementById("query").value = "trending music";
  searchVideos();
};
</script>

</body>
</html>
