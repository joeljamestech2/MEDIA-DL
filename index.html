<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --neon-blue: #00d9ff;
  --bg-dark: #0a0a0a;
  --card-bg: #111;
  --text-light: #eee;
  --btn-bg: #00d9ff;
  --btn-color: #000;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-dark);
  color: var(--text-light);
  padding: 20px;
}

h1 {
  text-align: center;
  color: var(--neon-blue);
  margin-bottom: 20px;
}

.search-container {
  display: flex;
  max-width: 600px;
  margin: 0 auto 30px auto;
  background: var(--card-bg);
  border-radius: 50px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,217,255,0.3);
}

.search-input {
  flex: 1;
  border: none;
  padding: 12px 20px;
  background: transparent;
  color: var(--text-light);
  font-size: 1rem;
  outline: none;
}

.icon-button {
  width: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card-bg);
  cursor: pointer;
  transition: 0.2s;
}

.icon-button:hover {
  background: rgba(0,217,255,0.2);
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card-bg);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,217,255,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(0,217,255,0.5);
}

.card img {
  width: 100%;
  display: block;
}

.meta {
  padding: 10px;
}

.meta p {
  margin: 5px 0;
  font-size: 0.9rem;
  color: #ccc;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  flex: 1;
  margin: 0 5px;
  padding: 8px 0;
  border: none;
  border-radius: 8px;
  background: var(--btn-bg);
  color: var(--btn-color);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: rgba(0,217,255,0.8);
}

.loading, .error {
  text-align: center;
  margin: 20px;
  color: var(--neon-blue);
}

.audio-player, .video-player {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>
<body>

<h1>JOEL XMD YT DOWNLOADER</h1>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube or paste URL">
  <div class="icon-button" onclick="searchVideos()">
    <span class="material-icons">search</span>
  </div>
</div>

<div id="results"></div>
<div id="error" class="error"></div>

<script>
const proxies = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchSafe(url) {
  for (let p of proxies) {
    try {
      const res = await fetch(p(url));
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("Fetch failed");
}

async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");
  const error = document.getElementById("error");

  if (!q) return;

  results.innerHTML = `<div class="loading">🔍 Searching...</div>`;
  error.textContent = '';

  try {
    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(q)}`;
    const data = await fetchSafe(api);

    if(!data.results?.length){
      results.innerHTML = '';
      error.textContent = "❌ No results found";
      return;
    }

    results.innerHTML = '';

    data.results.slice(0,10).forEach(video => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${video.thumbnail}" alt="${video.title}">
        <div class="meta">
          <p><b>${video.title}</b></p>
          <p>👤 ${video.author}</p>
          <p>⏱ ${video.duration}</p>
        </div>
        <div class="actions">
          <button onclick="downloadMedia('${video.url}','mp3')">MP3</button>
          <button onclick="downloadMedia('${video.url}','mp4')">MP4</button>
        </div>
        <audio class="audio-player" controls src="" hidden></audio>
        <video class="video-player" controls src="" hidden></video>
      `;

      results.appendChild(card);
    });

  } catch(err){
    console.error(err);
    results.innerHTML = '';
    error.textContent = "❌ Search failed";
  }
}

async function downloadMedia(url, format){
  try {
    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const data = await fetchSafe(api);

    if(data?.data?.url){
      // auto download
      const a = document.createElement('a');
      a.href = data.data.url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      alert(`Downloading: ${data.data.title}`);
    } else {
      alert("❌ Download failed");
    }

  } catch(err){
    console.error(err);
    alert("❌ Download failed");
  }
}

// Auto search trending on load
window.onload = () => {
  document.getElementById("query").value = "trending music";
  searchVideos();
};
</script>

</body>
</html>
