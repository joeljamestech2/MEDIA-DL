<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD YT DOWNLOADER</title>

<link rel="icon" href="https://raw.githubusercontent.com/joeljamestech2/JOEL-XMD/refs/heads/main/mydata/media/joelXtec.jpg">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Icons FIXED -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h1 {
  color: #00d9ff;
  font-size: 1.3rem;
}

.search-container {
  display: flex;
  align-items: center;
  background: #111;
  border-radius: 30px;
  padding: 8px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
  padding: 8px;
}

.icon-button {
  background: #222;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 6px;
  cursor: pointer;
}

.results {
  margin-top: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 15px;
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.actions button {
  margin-top: 6px;
  margin-right: 5px;
  padding: 5px 10px;
  border: none;
  background: #00d9ff;
  color: #000;
  border-radius: 6px;
  cursor: pointer;
}

.loading {
  color: #00d9ff;
}

.error {
  color: red;
}
</style>
</head>

<body>

<h1>JOEL XMD YT DOWNLOADER</h1>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search or paste YouTube URL">
  
  <div class="icon-button" onclick="searchVideos()">
    <span class="material-icons">search</span>
  </div>
</div>

<div id="error" class="error"></div>
<div id="results" class="results"></div>

<script>
const input = document.getElementById("query");
const results = document.getElementById("results");
const error = document.getElementById("error");

// AUTO LOAD
window.onload = () => {
  input.value = "trending music";
  searchVideos();
};

input.addEventListener("keydown", e => {
  if (e.key === "Enter") searchVideos();
});

async function searchVideos() {
  const query = input.value.trim();
  if (!query) return;

  results.innerHTML = '<div class="loading">Searching...</div>';
  error.textContent = "";

  try {
    const api = `https://corsproxy.io/?${encodeURIComponent(
      `https://my-rest-apis-six.vercel.app/yts?query=${query}`
    )}`;

    const res = await fetch(api);
    const json = await res.json();

    results.innerHTML = "";

    if (!json?.results?.length) {
      error.textContent = "No results found";
      return;
    }

    json.results.slice(0, 20).forEach(video => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${video.thumbnail || ''}">
        <p><b>${video.title || 'No title'}</b></p>
        <p>${video.author || 'Unknown'}</p>
        <p>${video.duration || ''}</p>

        <div class="actions">
          <button onclick="downloadMedia('${video.url}','mp3',this)">MP3</button>
          <button onclick="downloadMedia('${video.url}','mp4',this)">MP4</button>
        </div>
      `;

      results.appendChild(card);
    });

  } catch (err) {
    error.textContent = "Failed to fetch videos";
  }
}

async function downloadMedia(url, format, btn) {
  btn.disabled = true;
  btn.innerText = "Loading...";

  try {
    const api = `https://corsproxy.io/?${encodeURIComponent(
      `https://iamtkm.vercel.app/downloaders/yt${format}?url=${url}`
    )}`;

    const res = await fetch(api);
    const json = await res.json();

    if (json?.data?.url) {
      window.open(json.data.url, "_blank");
    } else {
      alert("Download failed");
    }

  } catch {
    alert("Error downloading");
  }

  btn.disabled = false;
  btn.innerText = format.toUpperCase();
}
</script>

</body>
</html>
