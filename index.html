<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL XMD DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<!-- ✅ Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  background: #000;
  color: #fff;
  padding: 1rem;
  text-align: center;
}

h2 { color: #00d9ff; }

/* SEARCH */
.search-container {
  display: flex;
  background: #111;
  border-radius: 50px;
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: #fff;
  outline: none;
}

.icon-button {
  background: #00d9ff;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #000;
}

/* CARD */
.card {
  background: #111;
  padding: 12px;
  margin: 15px 0;
  border-radius: 15px;
  box-shadow: 0 0 10px #00d9ff22;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  background: #00d9ff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* STATUS */
.status {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

/* DOWNLOAD BAR */
.download-bar {
  width: 100%;
  height: 5px;
  background: #222;
  border-radius: 10px;
  margin-top: 6px;
}

.download-progress {
  height: 100%;
  width: 0%;
  background: #00d9ff;
  transition: width 0.3s;
}
</style>
</head>

<body>

<h2><i class="fa fa-cloud-download-alt"></i> JOEL XMD</h2>

<div class="search-container">
  <input id="query" class="search-input" placeholder="Search YouTube...">
  <div class="icon-button" onclick="searchVideos()">
    <i class="fa fa-search"></i>
  </div>
</div>

<div id="results"></div>

<script>
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// 🔍 SEARCH (MATCHES YOUR API EXACTLY)
async function searchVideos() {
  const q = document.getElementById("query").value.trim();
  const results = document.getElementById("results");

  if (!q) return;

  results.innerHTML = `<p><i class="fa fa-spinner fa-spin"></i> Searching...</p>`;

  try {
    await sleep(500); // ✅ prevent fast request fail

    const api = `https://my-rest-apis-six.vercel.app/yts?query=${encodeURIComponent(q)}`;
    const res = await fetch(api);
    const data = await res.json();

    console.log(data); // debug

    if (!data.results || !Array.isArray(data.results)) {
      throw new Error("Invalid API");
    }

    results.innerHTML = "";

    data.results.slice(0, 10).forEach(v => {
      results.innerHTML += `
        <div class="card">
          <img src="${v.thumbnail}">
          <p><b>${v.title}</b></p>
          <p>${v.author}</p>

          <button onclick="download(this,'${v.url}','mp3')">
            <i class="fa fa-music"></i> MP3
          </button>

          <button onclick="download(this,'${v.url}','mp4')">
            <i class="fa fa-video"></i> MP4
          </button>

          <div class="status"></div>
          <div class="download-bar">
            <div class="download-progress"></div>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    results.innerHTML = `<p><i class="fa fa-wifi"></i> Failed to fetch results</p>`;
  }
}

// 📥 DOWNLOAD (MATCHES YOUR RESPONSE STRUCTURE)
async function download(btn, url, format) {
  const card = btn.closest(".card");
  const status = card.querySelector(".status");
  const progress = card.querySelector(".download-progress");

  try {
    status.innerHTML = `<i class="fa fa-wifi fa-spin"></i> Fetching...`;

    await sleep(1000);

    const api = `https://iamtkm.vercel.app/downloaders/yt${format}?apikey=tkm&url=${encodeURIComponent(url)}`;
    const res = await fetch(api);
    const data = await res.json();

    console.log(data);

    if (!data?.data?.url) {
      status.innerHTML = `<i class="fa fa-times"></i> Failed`;
      return;
    }

    let p = 0;
    const interval = setInterval(() => {
      p += 10;
      progress.style.width = p + "%";
      if (p >= 100) clearInterval(interval);
    }, 150);

    await sleep(2000);

    status.innerHTML = `<i class="fa fa-check"></i> Opening`;
    window.open(data.data.url, "_blank");

  } catch (err) {
    console.error(err);
    status.innerHTML = `<i class="fa fa-times"></i> Error`;
  }
}

// AUTO LOAD
window.onload = () => {
  document.getElementById("query").value = "hi";
  searchVideos();
};
</script>

</body>
</html>
